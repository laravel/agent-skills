name: Update Skills

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch cloud-cli skills
        run: |
          git clone --no-checkout --depth 1 --filter=blob:none \
            https://github.com/laravel/cloud-cli.git /tmp/cloud-cli
          cd /tmp/cloud-cli
          git sparse-checkout set skills/deploying-laravel-cloud
          git checkout
          cp -r skills/deploying-laravel-cloud/. \
            $GITHUB_WORKSPACE/laravel-cloud/skills/deploying-laravel-cloud/

      - name: Fetch nightwatch skills
        run: |
          git clone --no-checkout --depth 1 --filter=blob:none \
            https://github.com/laravel/nightwatch.git /tmp/nightwatch
          cd /tmp/nightwatch
          git sparse-checkout set resources/boost/skills/configure-nightwatch
          git checkout
          cp -r resources/boost/skills/configure-nightwatch/. \
            $GITHUB_WORKSPACE/laravel-nightwatch/skills/configure-nightwatch/

      - name: Commit updated skills
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: Update skills from upstream
